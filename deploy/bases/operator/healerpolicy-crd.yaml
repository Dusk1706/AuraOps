apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: healerpolicies.auraops.io
spec:
  group: auraops.io
  scope: Namespaced
  names:
    plural: healerpolicies
    singular: healerpolicy
    kind: HealerPolicy
    shortNames:
      - hp
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetDeployment
              properties:
                targetDeployment:
                  type: string
                aiConfidenceThreshold:
                  type: number
                  format: double
                strategies:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - action
                    properties:
                      type:
                        type: string
                      action:
                        type: string
                      threshold:
                        type: string
                      maxReplicas:
                        type: integer
                        format: int32
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                lastAction:
                  type: string
                aiDiagnosis:
                  type: string
                healthScore:
                  type: number
                  format: double
                observedDeployment:
                  type: string
                timestamp:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Action
          type: string
          jsonPath: .status.lastAction
        - name: Score
          type: number
          jsonPath: .status.healthScore
