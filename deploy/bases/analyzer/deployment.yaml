apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-api-analyzer
  labels:
    app.kubernetes.io/name: aura-api-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aura-api-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aura-api-analyzer
        sidecar.istio.io/inject: "true"
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "aura-api-analyzer"
        vault.hashicorp.com/agent-inject-secret-application.properties: "secret/data/auraops/analyzer"
        vault.hashicorp.com/agent-inject-template-application.properties: |
          {{- with secret "secret/data/auraops/analyzer" -}}
          spring.ai.openai.api-key={{ index .Data.data "openai-api-key" }}
          spring.ai.anthropic.api-key={{ index .Data.data "anthropic-api-key" }}
          {{- end -}}
    spec:
      serviceAccountName: aura-api-analyzer
      containers:
        - name: analyzer
          image: auraops/aura-api-analyzer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: ollama
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: SPRING_AI_VECTOR_STORE_QDRANT_HOST
              value: qdrant.auraops-system.svc.cluster.local
            - name: SPRING_AI_VECTOR_STORE_QDRANT_PORT
              value: "6334"
            - name: SPRING_CONFIG_IMPORT
              value: optional:file:/vault/secrets/application.properties
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
