spring:
  application:
    name: aura-api-analyzer
  main:
    banner-mode: off
  profiles:
    default: openai
  ai:
    model:
      audio:
        speech: none
        transcription: none
      chat: openai
      image: none
      moderation: none
    chat:
      client:
        observations:
          log-prompt: false
          log-completion: false
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-3-5-sonnet-latest
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.1
      embedding:
        options:
          model: llama3.1
      init:
        pull-model-strategy: never

server:
  port: 8080

logging:
  level:
    com.auraops: DEBUG
    org.springframework.ai: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
---
spring:
  config:
    activate:
      on-profile: openai
  ai:
    model:
      embedding: openai
    openai:
      embedding:
        enabled: true
    ollama:
      embedding:
        enabled: false
    anthropic:
      embedding:
        enabled: false
---
spring:
  config:
    activate:
      on-profile: anthropic
  ai:
    model:
      embedding: openai
    anthropic:
      embedding:
        enabled: false
    openai:
      embedding:
        enabled: true
    ollama:
      embedding:
        enabled: false
---
spring:
  config:
    activate:
      on-profile: ollama
  ai:
    ollama:
      embedding:
        enabled: true
    openai:
      embedding:
        enabled: false
    anthropic:
      embedding:
        enabled: false
    model:
      chat: ollama
      embedding: ollama