services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "4200:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - aura-dashboard
      - aura-operator
    networks:
      - aura-network

  aura-dashboard:
    build:
      context: ./aura-dashboard
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      AURAOPS_OPERATOR_WS_BASE_URL: http://aura-operator:8080
    depends_on:
      - aura-api-analyzer
      - aura-operator
    networks:
      - aura-network

  aura-api-analyzer:
    build:
      context: ./aura-api-analyzer
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${AURAOPS_ANALYZER_PROFILE:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SPRING_AI_VECTOR_STORE_QDRANT_HOST: qdrant
      SPRING_AI_VECTOR_STORE_QDRANT_PORT: 6334
    depends_on:
      - loki
      - tempo
      - qdrant
    networks:
      - aura-network

  qdrant:
    image: qdrant/qdrant:v1.12.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - aura-network

  aura-operator:
    build:
      context: ./aura-operator
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: "8080"
      AURAOPS_ANALYZER_BASE_URL: http://aura-api-analyzer:8080
      AURAOPS_OBSERVABILITY_LOKI_ENABLED: "true"
      AURAOPS_OBSERVABILITY_LOKI_BASE_URL: http://loki:3100
      AURAOPS_OBSERVABILITY_TEMPO_ENABLED: "true"
      AURAOPS_OBSERVABILITY_TEMPO_BASE_URL: http://tempo:3200
      KUBECONFIG: /home/spring/.kube/config
    volumes:
      - ${USERPROFILE}/.kube:/home/spring/.kube:ro
    depends_on:
      - aura-api-analyzer
      - loki
      - tempo
    networks:
      - aura-network

  loki:
    image: grafana/loki:3.4.2
    command: ["--config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - aura-network

  tempo:
    image: grafana/tempo:2.7.2
    command: ["--config.file=/etc/tempo/tempo-config.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/observability/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - aura-network

volumes:
  loki-data:
  tempo-data:
  qdrant-data:

networks:
  aura-network:
    driver: bridge
